name: Setup Python, uv, and Hatch
description: Shared CI setup for Python version, uv cache, and Hatch installation

inputs:
  python-version:
    description: Python version for the job
    required: true

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          **/pyproject.toml
          **/uv.lock
          **/*.py.lock
          **/requirements*.txt
        cache-suffix: py${{ inputs.python-version }}

    - name: Install Hatch
      uses: pypa/hatch@257e27e51a6a5616ed08a39a408a21c35c9931bc # install
