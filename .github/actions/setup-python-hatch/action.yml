name: Setup Python, uv, and Hatch
description: Shared CI setup for Python version, uv cache, and Hatch installation

inputs:
  python-version:
    description: Python version for the job
    required: true

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: |
          **/pyproject.toml
          **/uv.lock
          **/*.py.lock
          **/requirements*.txt
        cache-suffix: py${{ inputs.python-version }}

    - name: Install Hatch
      uses: pypa/hatch@install
