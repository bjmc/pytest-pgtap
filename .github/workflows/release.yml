name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]*'  # e.g. v0.2.0, v1.0.0, v1.2.3rc1

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up toolchain
        uses: ./.github/actions/setup-python-hatch
        with:
          python-version: '3.13'

      - name: Build sdist and wheel
        run: hatch build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Mark as pre-release if the tag contains anything after the patch number
          if [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            gh release create "${{ github.ref_name }}" \
              --generate-notes \
              dist/*
          else
            gh release create "${{ github.ref_name }}" \
              --generate-notes \
              --prerelease \
              dist/*
          fi

  publish-pypi:
    name: Publish to PyPI
    needs: build
    # Only run on strict vX.Y.Z tags — no pre-release suffixes
    if: ${{ github.ref_name =~ '^v[0-9]+\.[0-9]+\.[0-9]+$' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for OIDC trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
