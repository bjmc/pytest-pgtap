name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]*'  # e.g. v0.2.0, v1.0.0, v1.2.3rc1

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    outputs:
      is-stable: ${{ steps.check-tag.outputs.stable }}

    steps:
      - name: Classify tag # Decides if this is a prerelease tag or a release that will go to PyPI.
        id: check-tag
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "stable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up toolchain
        uses: ./.github/actions/setup-python-hatch
        with:
          python-version: '3.13'

      - name: Build sdist and wheel
        run: hatch build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            ${{ needs.build.outputs.is-stable != 'true' && '--prerelease' || '' }} \
            dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: needs.build.outputs.is-stable == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for OIDC trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
