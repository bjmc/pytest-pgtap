name: CI

on:
  push:
    branches: [main]  # merge commits only; feature branch pushes do nothing until a PR is opened
  pull_request:       # full matrix on every PR update

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up toolchain
        uses: ./.github/actions/setup-python-hatch
        with:
          python-version: '3.13'

      - name: Run lint
        run: hatch run dev:lint

  test-matrix:
    name: Matrix (py${{ matrix.python-version }}, pytest${{ matrix.pytest-version }}, pg${{ matrix.pg-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        pytest-version: ['8', '9']
        pg-version: ['17', '18']

    env:
      TESTCONTAINERS_RYUK_DISABLED: 'true'

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up toolchain
        uses: ./.github/actions/setup-python-hatch
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: hatch run test.py${{ matrix.python-version }}-${{ matrix.pytest-version }}-${{ matrix.pg-version }}:run -x
